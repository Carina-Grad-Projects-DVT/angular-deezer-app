<form
  [formGroup]="form"
  class="flex flex-col gap-4 min-w-75 md:min-w-125"
  role="search"
  aria-label="Artist search"
>
  <input
    pInputText
    id="artist-search"
    type="search"
    formControlName="query"
    aria-describedby="artist-search-help"
    autocomplete="off"
    placeholder="Search artists..."
    class="!rounded-pill px-4 py-2"
  />
  <small id="artist-search-help" class="text-center">Please enter the name of the artist</small>
</form>
