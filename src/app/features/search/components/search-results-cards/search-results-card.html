<div
  class="cursor-pointer transition hover:ring-2 hover:ring-brand-green hover:shadow-md hover:-translate-y-2 rounded-lg"
>
  <p-card class="!bg-bg-mid">
    <div class="flex items-center gap-4">
      <img
        [src]="artist().picture_medium"
        [alt]="artist().name + ' profile image'"
        class="w-16 h-16 rounded-lg object-cover"
      />
      <div class="flex-1">
        <h3 class="text-lg font-semibold">{{ artist().name }}</h3>
        <p class="text-sm opacity-80">{{ artist().nb_album }} albums</p>
      </div>
    </div>
  </p-card>
</div>
